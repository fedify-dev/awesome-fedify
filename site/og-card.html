<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Awesome Fedify OG Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./og-card.css">
  </head>
  <body>
    <main class="card" aria-label="Open Graph card preview">
      <div class="card__frame">
        <div class="card__topline"></div>
        <header class="card__header">
          <img src="./logo.svg" alt="Fedify logo" width="112" height="112">
          <div>
            <p class="eyebrow">Fedify directory</p>
            <h1>Awesome Fedify</h1>
          </div>
        </header>
        <p class="lede">
          A curated directory of Fedify projects, packages, examples,
          tutorials, and talks.
        </p>
        <div class="meta-row">
          <div class="meta-card">
            <span>Source</span>
            <strong>README.md</strong>
          </div>
          <div class="meta-card">
            <span>Website</span>
            <strong>awesome.fedify.dev</strong>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
